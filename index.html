<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>知识星图</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #03060f;
    --panel-bg: rgba(6,12,28,0.93);
    --border: rgba(0,200,255,0.18);
    --blue: #00c8ff;
    --gold: #c9a84c;
    --purple: #a855f7;
    --green: #22d3a0;
    --red: #ff4d6d;
    --gray: #334155;
    --text: #e2e8f0;
    --text-dim: #64748b;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
    overflow: hidden;
    width: 100vw; height: 100vh;
    user-select: none;
  }
  #canvas-container { position:fixed; top:0; left:0; width:100vw; height:100vh; }
  canvas { display:block; }

  /* ── 顶部标题 ── */
  #header {
    position:fixed; top:0; left:0; right:0; height:56px;
    background:linear-gradient(to bottom,rgba(3,6,15,0.95),transparent);
    display:flex; align-items:center; padding:0 24px; gap:16px;
    z-index:100;
  }
  #header .title {
    font-size:20px; font-weight:700;
    background:linear-gradient(90deg,var(--blue),var(--purple));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    letter-spacing:2px; cursor:pointer;
  }
  #header .subtitle { font-size:12px; color:var(--text-dim); letter-spacing:1px; }
  #header .hdr-spacer { flex:1; }
  .hdr-btn {
    padding:5px 12px; border-radius:6px; border:1px solid var(--border);
    background:transparent; color:var(--text-dim); font-size:12px; cursor:pointer;
    transition:all .2s; pointer-events:all;
  }
  .hdr-btn:hover { color:var(--blue); border-color:var(--blue); background:rgba(0,200,255,0.07); }
  .hdr-btn.active { color:var(--gold); border-color:var(--gold); background:rgba(201,168,76,0.1); }

  /* ── 左侧分类过滤 ── */
  #sidebar {
    position:fixed; left:16px; top:70px; width:160px;
    display:flex; flex-direction:column; gap:6px; z-index:100;
    max-height:calc(100vh - 100px); overflow-y:auto;
  }
  #sidebar::-webkit-scrollbar { width:3px; }
  #sidebar::-webkit-scrollbar-thumb { background:var(--gray); border-radius:3px; }
  .sidebar-title {
    font-size:11px; color:var(--text-dim); letter-spacing:2px;
    padding:0 8px 4px; border-bottom:1px solid var(--border); margin-bottom:2px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .sidebar-add-cat {
    font-size:14px; cursor:pointer; color:var(--text-dim); padding:0 2px;
    transition:color .2s;
  }
  .sidebar-add-cat:hover { color:var(--blue); }
  .cat-btn {
    display:flex; align-items:center; gap:8px;
    padding:6px 10px; border-radius:8px; border:1px solid transparent;
    background:transparent; color:var(--text-dim); font-size:12px; cursor:pointer;
    transition:all .2s;
  }
  .cat-btn:hover,.cat-btn.active {
    background:rgba(0,200,255,0.08); border-color:var(--border); color:var(--text);
  }
  .cat-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .cat-count { margin-left:auto; font-size:10px; color:var(--text-dim); background:rgba(255,255,255,0.06); padding:1px 5px; border-radius:4px; }

  /* ── 右侧统计面板 ── */
  #stats-panel {
    position:fixed; right:16px; top:70px; width:200px;
    background:var(--panel-bg); border:1px solid var(--border);
    border-radius:12px; padding:16px; z-index:100; backdrop-filter:blur(12px);
  }
  .stats-title { font-size:11px; color:var(--text-dim); letter-spacing:2px; margin-bottom:12px; }
  .stats-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
  .stats-label { font-size:12px; color:var(--text-dim); }
  .stats-val { font-size:16px; font-weight:700; color:var(--blue); }
  .progress-bar { width:100%; height:4px; background:rgba(255,255,255,0.08); border-radius:4px; margin:8px 0 12px; overflow:hidden; }
  .progress-fill { height:100%; border-radius:4px; background:linear-gradient(90deg,var(--blue),var(--purple)); transition:width .5s ease; }
  .achievement-row { display:flex; align-items:center; gap:6px; padding:5px 6px; border-radius:6px; background:rgba(255,255,255,0.03); margin-bottom:4px; font-size:11px; color:var(--text-dim); }
  .achievement-row.unlocked { color:var(--gold); background:rgba(201,168,76,0.08); }

  /* ── 节点详情面板 ── */
  #detail-panel {
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
    width:440px; background:var(--panel-bg); border:1px solid var(--border);
    border-radius:16px; padding:20px; z-index:200; backdrop-filter:blur(20px);
    display:none; transition:all .3s ease;
  }
  #detail-panel.visible { display:block; animation:slideUp .3s ease; }
  @keyframes slideUp {
    from { opacity:0; transform:translateX(-50%) translateY(16px); }
    to   { opacity:1; transform:translateX(-50%) translateY(0); }
  }
  .detail-header { display:flex; align-items:flex-start; gap:12px; margin-bottom:12px; }
  .detail-icon { font-size:28px; line-height:1; flex-shrink:0; }
  .detail-name { font-size:18px; font-weight:700; color:var(--text); }
  .detail-cat { font-size:11px; color:var(--text-dim); margin-top:2px; }
  .detail-status { margin-left:auto; flex-shrink:0; }
  .status-badge { padding:4px 10px; border-radius:20px; font-size:11px; font-weight:600; cursor:pointer; transition:all .2s; }
  .status-badge.mastered { background:rgba(34,211,160,.15); border:1px solid var(--green); color:var(--green); }
  .status-badge.learning { background:rgba(201,168,76,.15); border:1px solid var(--gold); color:var(--gold); }
  .status-badge.locked   { background:rgba(100,116,139,.15); border:1px solid var(--gray); color:var(--text-dim); }
  .detail-desc { font-size:13px; color:var(--text-dim); line-height:1.6; margin-bottom:12px; }
  .detail-tags { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px; }
  .tag { padding:2px 8px; border-radius:4px; font-size:11px; background:rgba(0,200,255,0.08); border:1px solid rgba(0,200,255,.15); color:var(--blue); }
  .detail-connections { font-size:11px; color:var(--text-dim); border-top:1px solid var(--border); padding-top:10px; }
  .detail-connections span { color:var(--blue); }
  .detail-btn-row { display:flex; gap:8px; margin-top:12px; }
  .detail-btn { flex:1; padding:8px; border-radius:8px; border:1px solid var(--border); background:transparent; color:var(--text); font-size:12px; cursor:pointer; transition:all .2s; }
  .detail-btn:hover { background:rgba(0,200,255,0.08); }
  .detail-btn.primary { background:rgba(0,200,255,.12); border-color:var(--blue); color:var(--blue); }
  .detail-btn.primary:hover { background:rgba(0,200,255,.22); }
  .detail-btn.danger { background:rgba(255,77,109,.08); border-color:var(--red); color:var(--red); }
  .detail-btn.danger:hover { background:rgba(255,77,109,.18); }
  .close-btn {
    position:absolute; top:12px; right:12px; width:24px; height:24px;
    border-radius:50%; border:1px solid var(--border); background:transparent;
    color:var(--text-dim); cursor:pointer; font-size:14px;
    display:flex; align-items:center; justify-content:center;
  }
  .close-btn:hover { color:var(--text); background:rgba(255,255,255,0.06); }

  /* ── 右下控制 ── */
  #controls { position:fixed; bottom:20px; right:16px; display:flex; flex-direction:column; gap:8px; z-index:100; }
  .ctrl-btn {
    width:36px; height:36px; border-radius:8px; border:1px solid var(--border);
    background:var(--panel-bg); color:var(--text-dim); cursor:pointer; font-size:16px;
    display:flex; align-items:center; justify-content:center; transition:all .2s; backdrop-filter:blur(12px);
  }
  .ctrl-btn:hover { color:var(--blue); border-color:var(--blue); }

  /* ── 搜索框 ── */
  #search-wrap { position:fixed; top:70px; left:50%; transform:translateX(-50%); z-index:100; }
  #search-input {
    width:240px; padding:8px 14px 8px 32px; border-radius:20px;
    border:1px solid var(--border); background:rgba(6,12,28,0.85);
    color:var(--text); font-size:13px; outline:none;
    backdrop-filter:blur(12px); transition:border-color .2s;
  }
  #search-input:focus { border-color:var(--blue); }
  #search-input::placeholder { color:var(--text-dim); }
  .search-icon { position:absolute; left:10px; top:50%; transform:translateY(-50%); color:var(--text-dim); font-size:13px; pointer-events:none; }

  /* ── 模态框通用 ── */
  .modal-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,0.7);
    display:flex; align-items:center; justify-content:center;
    z-index:400; backdrop-filter:blur(4px);
    animation:fadeIn .2s ease;
  }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  .modal {
    background:#0a1628; border:1px solid var(--border); border-radius:16px;
    padding:28px; width:480px; max-width:96vw; max-height:90vh; overflow-y:auto;
    position:relative; box-shadow:0 20px 60px rgba(0,0,0,0.5);
    animation:scaleIn .2s ease;
  }
  @keyframes scaleIn { from{transform:scale(.95);opacity:0} to{transform:scale(1);opacity:1} }
  .modal h3 { font-size:16px; color:var(--text); margin-bottom:20px; letter-spacing:1px; }
  .form-row { margin-bottom:14px; }
  .form-row label { font-size:12px; color:var(--text-dim); margin-bottom:6px; display:block; }
  .form-input, .form-select, .form-textarea {
    width:100%; padding:9px 12px; border-radius:8px;
    border:1px solid var(--border); background:rgba(255,255,255,0.04);
    color:var(--text); font-size:13px; outline:none; transition:border-color .2s;
    font-family:inherit;
  }
  .form-input:focus,.form-select:focus,.form-textarea:focus { border-color:var(--blue); }
  .form-select option { background:#0a1628; color:var(--text); }
  .form-textarea { min-height:80px; resize:vertical; }
  .form-row-inline { display:flex; gap:10px; }
  .form-row-inline .form-row { flex:1; }
  .modal-btns { display:flex; gap:10px; margin-top:20px; }
  .modal-btn { flex:1; padding:10px; border-radius:8px; border:1px solid var(--border); background:transparent; color:var(--text); font-size:13px; cursor:pointer; transition:all .2s; }
  .modal-btn:hover { background:rgba(255,255,255,0.06); }
  .modal-btn.primary { background:rgba(0,200,255,.12); border-color:var(--blue); color:var(--blue); }
  .modal-btn.primary:hover { background:rgba(0,200,255,.2); }
  .modal-btn.danger { background:rgba(255,77,109,.08); border-color:var(--red); color:var(--red); }
  .modal-btn.danger:hover { background:rgba(255,77,109,.15); }
  .modal-close { position:absolute; top:14px; right:14px; background:none; border:none; color:var(--text-dim); font-size:18px; cursor:pointer; padding:4px; }
  .modal-close:hover { color:var(--text); }

  /* 连线管理列表 */
  .link-list { max-height:240px; overflow-y:auto; margin-top:12px; }
  .link-item { display:flex; align-items:center; gap:8px; padding:8px 10px; border-radius:6px; background:rgba(255,255,255,0.03); margin-bottom:4px; font-size:12px; }
  .link-item:hover { background:rgba(255,255,255,0.06); }
  .link-del { margin-left:auto; color:var(--red); cursor:pointer; font-size:14px; opacity:.6; }
  .link-del:hover { opacity:1; }

  /* 分类颜色选择 */
  .color-grid { display:flex; flex-wrap:wrap; gap:6px; margin-top:6px; }
  .color-opt { width:24px; height:24px; border-radius:6px; cursor:pointer; border:2px solid transparent; transition:all .15s; }
  .color-opt:hover,.color-opt.selected { border-color:white; transform:scale(1.15); }

  /* ── Toast提示 ── */
  #toast {
    position:fixed; top:80px; left:50%; transform:translateX(-50%) translateY(-20px);
    background:rgba(6,12,28,0.95); border:1px solid var(--green);
    color:var(--green); padding:8px 20px; border-radius:20px;
    font-size:13px; opacity:0; transition:all .3s; z-index:300; pointer-events:none;
  }
  #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  #toast.error { border-color:var(--red); color:var(--red); }

  /* ── 编辑模式提示条 ── */
  #edit-bar {
    position:fixed; top:56px; left:0; right:0; height:30px;
    background:rgba(201,168,76,0.12); border-bottom:1px solid rgba(201,168,76,0.25);
    display:none; align-items:center; justify-content:center; gap:16px;
    font-size:11px; color:var(--gold); letter-spacing:1px; z-index:99;
  }
  #edit-bar.visible { display:flex; }
  .edit-bar-btn { padding:2px 10px; border-radius:4px; border:1px solid rgba(201,168,76,0.3); background:transparent; color:var(--gold); font-size:11px; cursor:pointer; }
  .edit-bar-btn:hover { background:rgba(201,168,76,0.15); }

  /* ── 提示 ── */
  #hint { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); font-size:11px; color:var(--text-dim); pointer-events:none; z-index:50; letter-spacing:1px; }

  /* 星场 */
  #starfield { position:fixed; top:0; left:0; width:100vw; height:100vh; pointer-events:none; z-index:0; }

  /* 编辑节点图标选择器 */
  .emoji-grid { display:flex; flex-wrap:wrap; gap:4px; max-height:100px; overflow-y:auto; margin-top:6px; }
  .emoji-opt { padding:4px 6px; border-radius:4px; cursor:pointer; font-size:16px; background:rgba(255,255,255,0.04); transition:background .15s; }
  .emoji-opt:hover,.emoji-opt.selected { background:rgba(0,200,255,0.15); }

  /* 导入导出区 */
  .export-area { background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:8px; padding:12px; font-size:11px; color:var(--text-dim); margin-top:10px; }
</style>
</head>
<body>

<canvas id="starfield"></canvas>
<div id="canvas-container"><canvas id="main-canvas"></canvas></div>

<!-- 顶部标题 -->
<div id="header">
  <div class="title" id="site-title" onclick="editTitle()">知识星图</div>
  <div class="subtitle" id="site-subtitle">KNOWLEDGE CONSTELLATION</div>
  <div class="hdr-spacer"></div>
  <button class="hdr-btn" onclick="openAddNode()" title="添加新知识节点">＋ 添加节点</button>
  <button class="hdr-btn" onclick="openLinkManager()" title="管理节点连线">🔗 连线管理</button>
  <button class="hdr-btn" onclick="openImportExport()" title="导入/导出数据">📤 导入导出</button>
  <button class="hdr-btn" id="edit-mode-btn" onclick="toggleEditMode()" title="编辑模式">✏️ 编辑模式</button>
</div>

<!-- 编辑模式提示条 -->
<div id="edit-bar" class="visible">
  <span>✏️ 编辑模式已开启 — 点击节点可编辑/删除</span>
  <button class="edit-bar-btn" onclick="toggleEditMode()">退出编辑</button>
</div>

<!-- 搜索 -->
<div id="search-wrap">
  <span class="search-icon">🔍</span>
  <input id="search-input" type="text" placeholder="搜索知识节点..." />
</div>

<!-- 左侧分类 -->
<div id="sidebar">
  <div class="sidebar-title">
    CATEGORIES
    <span class="sidebar-add-cat" onclick="openAddCategory()" title="添加分类">＋</span>
  </div>
  <button class="cat-btn active" data-cat="all" onclick="filterCat('all',this)">
    <span class="cat-dot" style="background:#ffffff"></span> 全部 <span class="cat-count" id="cnt-all">0</span>
  </button>
  <div id="cat-list"></div>
</div>

<!-- 右侧统计 -->
<div id="stats-panel">
  <div class="stats-title">KNOWLEDGE STATUS</div>
  <div class="stats-row">
    <div class="stats-label">总节点</div>
    <div class="stats-val" id="stat-total">0</div>
  </div>
  <div class="stats-row">
    <div class="stats-label">已掌握</div>
    <div class="stats-val" style="color:var(--green)" id="stat-mastered">0</div>
  </div>
  <div class="stats-row">
    <div class="stats-label">学习中</div>
    <div class="stats-val" style="color:var(--gold)" id="stat-learning">0</div>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
  </div>
  <div style="font-size:11px;color:var(--text-dim);margin-bottom:14px">
    掌握度 <span id="stat-pct" style="color:var(--blue)">0%</span>
  </div>
  <div style="font-size:11px;color:var(--text-dim);letter-spacing:1px;margin-bottom:8px">ACHIEVEMENTS</div>
  <div id="achievements-list"></div>
</div>

<!-- 节点详情面板 -->
<div id="detail-panel">
  <button class="close-btn" onclick="closeDetail()">✕</button>
  <div class="detail-header">
    <div class="detail-icon" id="d-icon">🧠</div>
    <div>
      <div class="detail-name" id="d-name">节点名称</div>
      <div class="detail-cat" id="d-cat">分类</div>
    </div>
    <div class="detail-status">
      <div class="status-badge" id="d-status" onclick="cycleStatus()">已掌握</div>
    </div>
  </div>
  <div class="detail-desc" id="d-desc">节点描述</div>
  <div class="detail-tags" id="d-tags"></div>
  <div class="detail-connections" id="d-connections"></div>
  <div class="detail-btn-row">
    <button class="detail-btn" onclick="closeDetail()">关闭</button>
    <button class="detail-btn primary" onclick="cycleStatus()">切换状态</button>
    <button class="detail-btn" id="edit-node-btn" onclick="openEditNode()" style="display:none">✏️ 编辑</button>
    <button class="detail-btn danger" id="del-node-btn" onclick="deleteCurrentNode()" style="display:none">🗑 删除</button>
  </div>
</div>

<!-- 右下控制 -->
<div id="controls">
  <button class="ctrl-btn" onclick="resetView()" title="重置视角">⟳</button>
  <button class="ctrl-btn" onclick="toggleAutoRotate()" id="rotate-btn" title="自动旋转">⏵</button>
  <button class="ctrl-btn" onclick="zoomIn()" title="放大">＋</button>
  <button class="ctrl-btn" onclick="zoomOut()" title="缩小">－</button>
</div>

<div id="toast"></div>
<div id="hint">点击节点查看详情 · 拖拽旋转 · 滚轮缩放</div>

<!-- ═══════════════════════════════════════════════════
     模态框：新增/编辑节点
════════════════════════════════════════════════════ -->
<div id="modal-node" class="modal-overlay" style="display:none">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('modal-node')">✕</button>
    <h3 id="modal-node-title">✨ 添加知识节点</h3>
    <div class="form-row-inline">
      <div class="form-row">
        <label>节点名称 *</label>
        <input class="form-input" id="fn-name" placeholder="如：机器学习" />
      </div>
      <div class="form-row" style="flex:0 0 90px">
        <label>图标</label>
        <input class="form-input" id="fn-icon" placeholder="🧠" style="text-align:center;font-size:20px" />
      </div>
    </div>
    <div class="form-row">
      <label>常用图标快选</label>
      <div class="emoji-grid" id="emoji-grid"></div>
    </div>
    <div class="form-row-inline">
      <div class="form-row">
        <label>所属分类 *</label>
        <select class="form-select" id="fn-cat"></select>
      </div>
      <div class="form-row">
        <label>初始状态</label>
        <select class="form-select" id="fn-status">
          <option value="locked">🔒 待点亮</option>
          <option value="learning">📖 学习中</option>
          <option value="mastered">✅ 已掌握</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <label>节点描述</label>
      <textarea class="form-textarea" id="fn-desc" placeholder="描述这个知识领域的内容、用途..."></textarea>
    </div>
    <div class="form-row">
      <label>标签（逗号分隔）</label>
      <input class="form-input" id="fn-tags" placeholder="如：深度学习,神经网络,PyTorch" />
    </div>
    <div class="form-row" id="fn-id-row">
      <label>节点ID（英文，唯一）</label>
      <input class="form-input" id="fn-id" placeholder="自动生成，可自定义" />
    </div>
    <div class="modal-btns">
      <button class="modal-btn" onclick="closeModal('modal-node')">取消</button>
      <button class="modal-btn primary" onclick="saveNode()">保存节点</button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════
     模态框：连线管理
════════════════════════════════════════════════════ -->
<div id="modal-links" class="modal-overlay" style="display:none">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('modal-links')">✕</button>
    <h3>🔗 连线管理</h3>
    <div class="form-row">
      <label>添加新连线</label>
      <div style="display:flex;gap:8px;align-items:center">
        <select class="form-select" id="link-from" style="flex:1"></select>
        <span style="color:var(--text-dim);font-size:18px">↔</span>

<script>
// ═══════════════════════════════════════════════════
// 全局状态
// ═══════════════════════════════════════════════════
let nodes = [];
let links = [];
let categories = {};
let currentCat = 'all';
let selectedNode = null;
let autoRotate = true;
let hoveredNode = null;
let editMode = true;

const EMOJI_LIST = ['🧠','🤖','🔍','🎨','🎬','💻','🦾','👁','⚙️','🎯','🟨','⚛️','🟩','🐍','🌿','🔌','🗄','🚀','📱','📐','🎥','✂️','📝','🎞','🌈','🔊','🎭','✍️','📲','🌍','👤','📊','📣','📦','📈','🌐','🖥','🖼','✨','💎','🔄','🧩','📚','🗂','💡','🏆','⭐','🌟','🔮','🧬','⚡','🌊','🏔','🦋','🌺','🎵','📡','🔬','🧪'];
const PRESET_COLORS = ['#00c8ff','#a855f7','#f59e0b','#ec4899','#22d3a0','#fb923c','#818cf8','#ef4444','#10b981','#f97316','#8b5cf6','#06b6d4','#84cc16','#e11d48','#0ea5e9'];

// ── API 工具 ──────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch('/api' + path, opts);
  return r.json();
}

// ── 初始化：从服务器加载数据 ────────────────────────
async function init() {
  try {
    const data = await api('GET', '/data');
    nodes = data.nodes || [];
    links = data.links || [];
    categories = data.categories || {};
    if (data.title) {
      document.getElementById('site-title').textContent = data.title;
      document.title = data.title;
    }
    if (data.subtitle) document.getElementById('site-subtitle').textContent = data.subtitle;
  } catch(e) {
    showToast('⚠️ 无法连接服务器，使用本地数据', true);
    // Fallback: 空数据
    nodes = []; links = []; categories = { ai: { name:'AI 技术', color:'#00c8ff' } };
  }
  renderCatList();
  updateStats();
  render();
  setTimeout(() => showToast('🌌 知识星图已就绪，点击节点开始探索'), 600);
}

// ── 分类渲染 ──────────────────────────────────────
function renderCatList() {
  const el = document.getElementById('cat-list');
  el.innerHTML = Object.entries(categories).map(([id, cat]) => `
    <button class="cat-btn" data-cat="${id}" onclick="filterCat('${id}',this)">
      <span class="cat-dot" style="background:${cat.color}"></span>
      ${cat.name}
      <span class="cat-count" id="cnt-${id}">0</span>
    </button>
  `).join('');
  updateStats();
}

// ── 3D 渲染核心 ────────────────────────────────────
const canvas = document.getElementById('main-canvas');
const ctx2 = canvas.getContext('2d');
let W = canvas.width = innerWidth;
let H = canvas.height = innerHeight;
window.addEventListener('resize', () => { W = canvas.width = innerWidth; H = canvas.height = innerHeight; });

const SPHERE_R = () => Math.min(W, H) * 0.32;

function fibSphere(n) {
  const pts = [], g = Math.PI * (3 - Math.sqrt(5));
  for(let i=0;i<n;i++){
    const y = 1 - (i/(n-1))*2, r = Math.sqrt(1-y*y), t = g*i;
    pts.push([Math.cos(t)*r, y, Math.sin(t)*r]);
  }
  return pts;
}

let positions3D = [];
function initPositions() {
  const filtered = getFilteredNodes();
  if (!filtered.length) { positions3D = []; return; }
  const pts = fibSphere(filtered.length);
  positions3D = filtered.map((node, i) => ({ node, x:pts[i][0], y:pts[i][1], z:pts[i][2] }));
}

let rotX=0.3, rotY=0, zoom=1, autoAngle=0;
let isDragging=false, lastMX, lastMY;

function rotatePoint(x,y,z) {
  const ry = rotY + (autoRotate ? autoAngle : 0);
  const cY=Math.cos(ry), sY=Math.sin(ry);
  let x1=x*cY-z*sY, z1=x*sY+z*cY;
  const cX=Math.cos(rotX), sX=Math.sin(rotX);
  let y2=y*cX-z1*sX, z2=y*sX+z1*cX;
  return {x:x1, y:y2, z:z2};
}

function project(x,y,z) {
  const sr=SPHERE_R(), fov=900, scale=fov/(fov+z*sr*zoom);
  return { px: W/2+x*sr*zoom*scale, py: H/2+y*sr*zoom*scale, scale, depth:z };
}

function hexAlpha(hex, alpha) {
  if(!hex||hex.length<7) return `rgba(100,100,100,${alpha})`;
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function getNodeColor(node) {
  const cat = categories[node.cat] || { color:'#64748b' };
  return cat.color;
}

function getFilteredNodes() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  return nodes.filter(n => {
    const catOk = currentCat === 'all' || n.cat === currentCat;
    const searchOk = !q || n.name.toLowerCase().includes(q) || (n.tags||[]).some(t=>t.toLowerCase().includes(q));
    return catOk && searchOk;
  });
}

function getVisibleLinks() {
  const filtered = getFilteredNodes();
  const ids = new Set(filtered.map(n => n.id));
  return links.filter(([a,b]) => ids.has(a) && ids.has(b));
}

function render() {
  ctx2.clearRect(0, 0, W, H);
  if(autoRotate) autoAngle += 0.003;
  initPositions();

  const sorted = positions3D.map(p => {
    const r = rotatePoint(p.x, p.y, p.z);
    const proj = project(r.x, r.y, r.z);
    return {...p, ...r, ...proj};
  }).sort((a,b) => a.depth - b.depth);

  const sortedMap = {};
  sorted.forEach(p => sortedMap[p.node.id] = p);

  // 连线
  const vlinks = getVisibleLinks();
  vlinks.forEach(([aid, bid]) => {
    const a=sortedMap[aid], b=sortedMap[bid];
    if(!a||!b) return;
    const bothM = a.node.status==='mastered' && b.node.status==='mastered';
    const avg = (a.depth + b.depth)/2;
    const fa = (bothM ? 0.25 : 0.08) * Math.max(0.2,(avg+1)/2);
    ctx2.beginPath();
    ctx2.moveTo(a.px, a.py); ctx2.lineTo(b.px, b.py);
    ctx2.strokeStyle = bothM ? hexAlpha(getNodeColor(a.node), fa) : `rgba(100,130,180,${fa})`;
    ctx2.lineWidth = bothM ? 1.2 : 0.5;
    ctx2.stroke();
  });

  // 悬停高亮连线
  if(hoveredNode) {
    vlinks.forEach(([aid, bid]) => {
      if(aid!==hoveredNode.id && bid!==hoveredNode.id) return;
      const a=sortedMap[aid], b=sortedMap[bid];
      if(!a||!b) return;
      ctx2.beginPath(); ctx2.moveTo(a.px, a.py); ctx2.lineTo(b.px, b.py);
      ctx2.strokeStyle='rgba(0,200,255,0.55)'; ctx2.lineWidth=1.5; ctx2.stroke();
    });
  }

  // 节点
  sorted.forEach(p => {
    const n = p.node;
    const isH = hoveredNode && hoveredNode.id===n.id;
    const isS = selectedNode && selectedNode.id===n.id;
    const baseR = n.status==='mastered'?18:(n.status==='learning'?14:10);
    const r = baseR * p.scale * zoom * (isH?1.4:1) * (isS?1.5:1);
    const d01 = (p.depth+1)/2;
    const dim = 0.3 + d01*0.7;
    const col = getNodeColor(n);

    // 光晕
    if(n.status!=='locked') {
      const gr = r*2.2;
      const grad = ctx2.createRadialGradient(p.px,p.py,0,p.px,p.py,gr);
      grad.addColorStop(0, hexAlpha(col, 0.18*dim*(isH?2:1)));
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx2.beginPath(); ctx2.arc(p.px,p.py,gr,0,Math.PI*2);
      ctx2.fillStyle=grad; ctx2.fill();
    }

    // 主圆
    ctx2.beginPath(); ctx2.arc(p.px,p.py,r,0,Math.PI*2);
    if(n.status==='locked') {
      ctx2.fillStyle=`rgba(30,40,60,${0.6*dim})`; ctx2.fill();
      ctx2.strokeStyle=`rgba(80,100,140,${0.4*dim})`; ctx2.lineWidth=1; ctx2.stroke();
    } else {
      const g2 = ctx2.createRadialGradient(p.px-r*.3, p.py-r*.3, 0, p.px, p.py, r);
      g2.addColorStop(0, hexAlpha(col,0.9*dim)); g2.addColorStop(1, hexAlpha(col,0.3*dim));
      ctx2.fillStyle=g2; ctx2.fill();
      ctx2.strokeStyle=hexAlpha(col,0.8*dim);
      ctx2.lineWidth=isS?3:(isH?2:1); ctx2.stroke();
      if(n.status==='learning') {
        ctx2.setLineDash([3,3]);
        ctx2.strokeStyle=hexAlpha(col,0.5*dim); ctx2.lineWidth=1.5; ctx2.stroke();
        ctx2.setLineDash([]);
      }
    }

    // 图标
    const fs = Math.max(8, Math.round(r*0.85));
    ctx2.font=`${fs}px serif`; ctx2.textAlign='center'; ctx2.textBaseline='middle';
    ctx2.globalAlpha=dim*(n.status==='locked'?0.3:1);
    ctx2.fillText(n.icon||'⭕', p.px, p.py);
    ctx2.globalAlpha=1;

    // 名称
    if(isH||isS||r>16) {
      const fs2=Math.max(9,Math.round(r*0.55));
      ctx2.font=`${fs2}px 'PingFang SC',sans-serif`;
      ctx2.textAlign='center'; ctx2.textBaseline='top';
      ctx2.fillStyle=hexAlpha(n.status==='locked'?'#64748b':'#e2e8f0', 0.85*dim);
      ctx2.fillText(n.name, p.px, p.py+r+3);
    }

    // 编辑模式 badge
    if(editMode && (isH||isS)) {
      ctx2.font=`${Math.max(8,r*0.5)}px serif`;
      ctx2.textAlign='center'; ctx2.textBaseline='bottom';
      ctx2.globalAlpha=0.8;
      ctx2.fillText('✏️', p.px+r*0.6, p.py-r*0.6);
      ctx2.globalAlpha=1;
    }
  });

  requestAnimationFrame(render);
}

// ── 交互事件 ──────────────────────────────────────
function getNodeAt(mx, my) {
  const filtered = getFilteredNodes();
  let best=null, bestDist=Infinity;
  filtered.forEach(node => {
    const p3 = positions3D.find(p=>p.node.id===node.id);
    if(!p3) return;
    const r = rotatePoint(p3.x, p3.y, p3.z);
    const proj = project(r.x, r.y, r.z);
    const dx=proj.px-mx, dy=proj.py-my, dist=Math.sqrt(dx*dx+dy*dy);
    const baseR=node.status==='mastered'?18:(node.status==='learning'?14:10);
    const hitR=baseR*proj.scale*zoom*1.5;
    if(dist<hitR&&dist<bestDist){ best=node; bestDist=dist; }
  });
  return best;
}

canvas.addEventListener('mousemove', e => {
  if(isDragging){
    rotY += (e.clientX-lastMX)*0.005;
    rotX += (e.clientY-lastMY)*0.005;
    rotX=Math.max(-Math.PI/2,Math.min(Math.PI/2,rotX));
    lastMX=e.clientX; lastMY=e.clientY;
    hoveredNode=null; canvas.style.cursor='grabbing';
  } else {
    hoveredNode=getNodeAt(e.clientX,e.clientY);
    canvas.style.cursor=hoveredNode?'pointer':'grab';
  }
});
canvas.addEventListener('mousedown', e => { isDragging=true; lastMX=e.clientX; lastMY=e.clientY; autoRotate=false; });
canvas.addEventListener('mouseup', e => {
  if(isDragging && Math.abs(e.clientX-lastMX)<3 && Math.abs(e.clientY-lastMY)<3){
    const n=getNodeAt(e.clientX,e.clientY);
    if(n) showDetail(n);
  }
  isDragging=false;
});
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  zoom*=e.deltaY>0?0.92:1.08;
  zoom=Math.max(0.3,Math.min(3,zoom));
},{passive:false});

// 触摸
let lastTouchDist=0;
canvas.addEventListener('touchstart', e=>{
  if(e.touches.length===1){ isDragging=true; lastMX=e.touches[0].clientX; lastMY=e.touches[0].clientY; autoRotate=false; }
  else if(e.touches.length===2) lastTouchDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
},{passive:true});
canvas.addEventListener('touchmove', e=>{
  if(e.touches.length===1&&isDragging){
    rotY+=(e.touches[0].clientX-lastMX)*0.005; rotX+=(e.touches[0].clientY-lastMY)*0.005;
    rotX=Math.max(-Math.PI/2,Math.min(Math.PI/2,rotX));
    lastMX=e.touches[0].clientX; lastMY=e.touches[0].clientY;
  } else if(e.touches.length===2){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    zoom*=d/lastTouchDist; zoom=Math.max(0.3,Math.min(3,zoom)); lastTouchDist=d;
  }
},{passive:true});
canvas.addEventListener('touchend',()=>isDragging=false);

// ── 详情面板 ──────────────────────────────────────
function showDetail(node) {
  selectedNode = node;
  document.getElementById('d-icon').textContent = node.icon||'⭕';
  document.getElementById('d-name').textContent = node.name;
  const cat = categories[node.cat] || { name: node.cat };
  document.getElementById('d-cat').textContent = `${cat.name}`;
  document.getElementById('d-desc').textContent = node.desc||'暂无描述';
  document.getElementById('d-tags').innerHTML = (node.tags||[]).map(t=>`<span class="tag">${t}</span>`).join('');
  const sm = { mastered:['已掌握','mastered'], learning:['学习中','learning'], locked:['待点亮','locked'] };
  const [txt,cls] = sm[node.status]||['未知','locked'];
  const se = document.getElementById('d-status');
  se.textContent=txt; se.className=`status-badge ${cls}`;

  const related = links.filter(([a,b])=>a===node.id||b===node.id)
    .map(([a,b])=>a===node.id?b:a).map(id=>nodes.find(n=>n.id===id)).filter(Boolean);
  document.getElementById('d-connections').innerHTML = related.length
    ? `关联节点：${related.map(n=>`<span>${n.icon||''}${n.name}</span>`).join('、')}` : '';

  document.getElementById('edit-node-btn').style.display = editMode ? 'block' : 'none';
  document.getElementById('del-node-btn').style.display = editMode ? 'block' : 'none';
  document.getElementById('detail-panel').classList.add('visible');
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('visible');
  selectedNode = null;
}

async function cycleStatus() {
  if(!selectedNode) return;
  const cy=['locked','learning','mastered'];
  const idx=cy.indexOf(selectedNode.status);
  selectedNode.status=cy[(idx+1)%3];
  await api('PUT',`/nodes/${selectedNode.id}`,{ status:selectedNode.status });
  showDetail(selectedNode);
  updateStats();
  const labels=['待点亮','学习中','已掌握'];
  showToast(`✨ ${selectedNode.name} → ${labels[cy.indexOf(selectedNode.status)]}`);
}

// ── 编辑模式 ──────────────────────────────────────
function toggleEditMode() {
  editMode = !editMode;
  const btn = document.getElementById('edit-mode-btn');
  const bar = document.getElementById('edit-bar');
  btn.classList.toggle('active', editMode);
  bar.classList.toggle('visible', editMode);
  if(selectedNode) showDetail(selectedNode);
}

// ── 新增/编辑节点 ─────────────────────────────────
let editingNodeId = null;

function fillCatSelect(selId) {
  const el = document.getElementById(selId);
  el.innerHTML = Object.entries(categories).map(([id,c])=>`<option value="${id}">${c.name}</option>`).join('');
}

function openAddNode() {
  editingNodeId = null;
  document.getElementById('modal-node-title').textContent = '✨ 添加知识节点';
  document.getElementById('fn-name').value = '';
  document.getElementById('fn-icon').value = '🧠';
  document.getElementById('fn-desc').value = '';
  document.getElementById('fn-tags').value = '';
  document.getElementById('fn-id').value = '';
  document.getElementById('fn-id-row').style.display = 'block';
  document.getElementById('fn-status').value = 'locked';
  fillCatSelect('fn-cat');
  renderEmojiGrid();
  document.getElementById('modal-node').style.display = 'flex';
}

function openEditNode() {
  if(!selectedNode) return;
  editingNodeId = selectedNode.id;
  document.getElementById('modal-node-title').textContent = '✏️ 编辑知识节点';
  document.getElementById('fn-name').value = selectedNode.name;
  document.getElementById('fn-icon').value = selectedNode.icon||'⭕';
  document.getElementById('fn-desc').value = selectedNode.desc||'';
  document.getElementById('fn-tags').value = (selectedNode.tags||[]).join('，');
  document.getElementById('fn-id').value = selectedNode.id;
  document.getElementById('fn-id-row').style.display = 'none';
  document.getElementById('fn-status').value = selectedNode.status;
  fillCatSelect('fn-cat');
  document.getElementById('fn-cat').value = selectedNode.cat;
  renderEmojiGrid();
  document.getElementById('modal-node').style.display = 'flex';
}

function renderEmojiGrid() {
  const cur = document.getElementById('fn-icon').value;
  document.getElementById('emoji-grid').innerHTML = EMOJI_LIST.map(e =>
    `<span class="emoji-opt${e===cur?' selected':''}" onclick="selectEmoji('${e}')">${e}</span>`
  ).join('');
}

function selectEmoji(e) {
  document.getElementById('fn-icon').value = e;
  renderEmojiGrid();
}

async function saveNode() {
  const name = document.getElementById('fn-name').value.trim();
  if(!name){ showToast('⚠️ 请填写节点名称', true); return; }
  const cat = document.getElementById('fn-cat').value;
  const icon = document.getElementById('fn-icon').value.trim() || '⭕';
  const desc = document.getElementById('fn-desc').value.trim();
  const tags = document.getElementById('fn-tags').value.split(/[，,、\s]+/).map(t=>t.trim()).filter(Boolean);
  const status = document.getElementById('fn-status').value;

  if(editingNodeId) {
    // 编辑
    const r = await api('PUT', `/nodes/${editingNodeId}`, { name, cat, icon, desc, tags, status });
    if(r.ok) {
      const idx = nodes.findIndex(n=>n.id===editingNodeId);
      if(idx>=0) nodes[idx] = r.node;
      showToast(`✅ 节点"${name}"已更新`);
      closeModal('modal-node');
      if(selectedNode && selectedNode.id===editingNodeId) showDetail(r.node);
    }
  } else {
    // 新增
    let id = document.getElementById('fn-id').value.trim();
    if(!id) id = 'node_' + Date.now();
    const r = await api('POST', '/nodes', { id, name, cat, icon, desc, tags, status });
    if(r.ok) {
      nodes.push(r.node);
      updateStats();
      showToast(`🌟 已添加节点"${name}"`);
      closeModal('modal-node');
    } else {
      showToast(`❌ ${r.error||'保存失败'}`, true);
    }
  }
  updateStats();
}

async function deleteCurrentNode() {
  if(!selectedNode) return;
  if(!confirm(`确定删除节点「${selectedNode.name}」？相关连线也会一并删除。`)) return;
  const id = selectedNode.id;
  const r = await api('DELETE', `/nodes/${id}`);
  if(r.ok) {
    nodes = nodes.filter(n=>n.id!==id);
    links = links.filter(([a,b])=>a!==id&&b!==id);
    closeDetail();
    updateStats();
    showToast(`🗑 节点已删除`);
  }
}

// ── 连线管理 ──────────────────────────────────────
function openLinkManager() {
  // 填充节点选择器
  const opts = nodes.map(n=>`<option value="${n.id}">${n.icon||''} ${n.name}</option>`).join('');
  document.getElementById('link-from').innerHTML = opts;
  document.getElementById('link-to').innerHTML = opts;
  renderLinkList();
  document.getElementById('modal-links').style.display = 'flex';
}

function renderLinkList() {
  document.getElementById('link-count').textContent = links.length;
  document.getElementById('link-list').innerHTML = links.map(([a,b],i) => {
    const na=nodes.find(n=>n.id===a), nb=nodes.find(n=>n.id===b);
    const na_name=na?`${na.icon||''}${na.name}`:a;
    const nb_name=nb?`${nb.icon||''}${nb.name}`:b;
    return `<div class="link-item">
      <span>${na_name}</span>
      <span style="color:var(--text-dim)"> ↔ </span>
      <span>${nb_name}</span>
      <span class="link-del" onclick="deleteLink('${a}','${b}')">✕</span>
    </div>`;
  }).join('');
}

async function addLink() {
  const from = document.getElementById('link-from').value;
  const to = document.getElementById('link-to').value;
  if(from===to){ showToast('⚠️ 不能连接相同节点', true); return; }
  const r = await api('POST', '/links', { from, to });
  if(r.ok){ links.push([from,to]); renderLinkList(); showToast('🔗 连线已添加'); }
  else showToast(`❌ ${r.error||'添加失败'}`, true);
}

async function deleteLink(from, to) {
  const r = await api('DELETE', '/links', { from, to });
  if(r.ok){ links=links.filter(([a,b])=>!((a===from&&b===to)||(a===to&&b===from))); renderLinkList(); showToast('✅ 连线已删除'); }
}

// ── 分类管理 ──────────────────────────────────────
function openAddCategory() {
  document.getElementById('fc-name').value='';
  document.getElementById('fc-id').value='';
  document.getElementById('fc-color').value='#00c8ff';
  renderColorGrid();
  document.getElementById('modal-cat').style.display='flex';
}

function renderColorGrid() {
  const cur = document.getElementById('fc-color').value;
  document.getElementById('color-grid').innerHTML = PRESET_COLORS.map(c=>
    `<div class="color-opt${c===cur?' selected':''}" style="background:${c}" onclick="selectColor('${c}')" title="${c}"></div>`
  ).join('');
}

function selectColor(c) {
  document.getElementById('fc-color').value=c;
  renderColorGrid();
}

async function saveCategory() {
  const name=document.getElementById('fc-name').value.trim();
  const id=document.getElementById('fc-id').value.trim().replace(/\s/g,'');
  const color=document.getElementById('fc-color').value.trim()||'#64748b';
  if(!name||!id){ showToast('⚠️ 请填写分类名称和ID', true); return; }
  const r = await api('POST','/categories',{ id, name, color });
  if(r.ok){
    categories[id]={name,color};
    renderCatList();
    closeModal('modal-cat');
    showToast(`✅ 分类"${name}"已创建`);
  }
}

// ── 导入导出 ──────────────────────────────────────
function openImportExport() {
  const data = { nodes, links, categories, title: document.getElementById('site-title').textContent, subtitle: document.getElementById('site-subtitle').textContent };
  document.getElementById('io-text').value = JSON.stringify(data, null, 2);
  document.getElementById('modal-io').style.display='flex';
}

function exportData() {
  const data = { nodes, links, categories, title: document.getElementById('site-title').textContent };
  const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`knowledge-sphere-${new Date().toISOString().slice(0,10)}.json`;
  a.click(); showToast('⬇ 数据已导出');
}

async function importFromText() {
  try {
    const data = JSON.parse(document.getElementById('io-text').value);
    const r = await api('PUT','/data', data);
    if(r.ok){
      nodes=data.nodes||nodes; links=data.links||links; categories=data.categories||categories;
      if(data.title){ document.getElementById('site-title').textContent=data.title; document.title=data.title; }
      if(data.subtitle) document.getElementById('site-subtitle').textContent=data.subtitle;
      renderCatList(); updateStats();
      closeModal('modal-io');
      showToast('✅ 数据已导入');
    }
  } catch(e){ showToast('❌ JSON格式错误：'+e.message, true); }
}

function importData(e) {
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{ document.getElementById('io-text').value=ev.target.result; };
  reader.readAsText(file);
}

// ── 标题编辑 ──────────────────────────────────────
function editTitle() {
  if(!editMode) return;
  const cur = document.getElementById('site-title').textContent;
  const v = prompt('修改站点标题：', cur);
  if(v && v.trim()){
    document.getElementById('site-title').textContent = v.trim();
    document.title = v.trim();
    api('PUT','/settings',{ title: v.trim() });
  }
}

// ── 统计面板 ──────────────────────────────────────
function updateStats() {
  const total=nodes.length;
  const mastered=nodes.filter(n=>n.status==='mastered').length;
  const learning=nodes.filter(n=>n.status==='learning').length;
  const pct=total?Math.round(mastered/total*100):0;
  document.getElementById('stat-total').textContent=total;
  document.getElementById('stat-mastered').textContent=mastered;
  document.getElementById('stat-learning').textContent=learning;
  document.getElementById('stat-pct').textContent=pct+'%';
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('cnt-all').textContent=total;
  Object.keys(categories).forEach(cat=>{
    const el=document.getElementById(`cnt-${cat}`);
    if(el) el.textContent=nodes.filter(n=>n.cat===cat).length;
  });
  updateAchievements(mastered,learning,pct);
}

const ACHIEVEMENTS = [
  { id:'first',    icon:'🌱', name:'第一个节点',  cond:(m,l,p)=>m>=1 },
  { id:'ten',      icon:'🔟', name:'十域掌握者',  cond:(m,l,p)=>m>=10 },
  { id:'twenty',   icon:'⭐', name:'二十星点亮',  cond:(m,l,p)=>m>=20 },
  { id:'explorer', icon:'🗺', name:'全域探索者',  cond:(m,l,p)=>l>=5 },
  { id:'half',     icon:'🌗', name:'半壁知识版图', cond:(m,l,p)=>p>=50 },
  { id:'master',   icon:'👑', name:'知识大师',    cond:(m,l,p)=>p>=80 },
];

function updateAchievements(m,l,p) {
  document.getElementById('achievements-list').innerHTML = ACHIEVEMENTS.map(a =>
    `<div class="achievement-row ${a.cond(m,l,p)?'unlocked':''}">${a.icon} ${a.name}</div>`
  ).join('');
}

// ── 控制按钮 ──────────────────────────────────────
function filterCat(cat, btn) {
  currentCat=cat;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}
function resetView(){ rotX=0.3; rotY=0; zoom=1; autoAngle=0; autoRotate=true; }
function toggleAutoRotate(){
  autoRotate=!autoRotate;
  document.getElementById('rotate-btn').style.color=autoRotate?'var(--blue)':'';
}
function zoomIn(){ zoom=Math.min(3,zoom*1.2); }
function zoomOut(){ zoom=Math.max(0.3,zoom/1.2); }

// ── 搜索 ──────────────────────────────────────────
document.getElementById('search-input').addEventListener('input', ()=>initPositions());

// ── 模态框工具 ────────────────────────────────────
function closeModal(id){ document.getElementById(id).style.display='none'; }
document.querySelectorAll('.modal-overlay').forEach(m=>{
  m.addEventListener('click', e=>{ if(e.target===m) m.style.display='none'; });
});

// ── Toast ─────────────────────────────────────────
let toastTimer;
function showToast(msg, isError=false) {
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='show' + (isError?' error':'');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.className='',2400);
}

// ── 星场背景 ──────────────────────────────────────
(function initStars(){
  const c=document.getElementById('starfield'), ctx=c.getContext('2d');
  let stars=[];
  function resize(){ c.width=innerWidth; c.height=innerHeight; }
  resize(); window.addEventListener('resize',resize);
  for(let i=0;i<180;i++) stars.push({ x:Math.random()*innerWidth, y:Math.random()*innerHeight, r:Math.random()*1.2+0.2, a:Math.random(), da:(Math.random()-.5)*.008 });
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    stars.forEach(s=>{ s.a+=s.da; if(s.a<=0||s.a>=1)s.da=-s.da; ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fillStyle=`rgba(200,220,255,${s.a*.6})`; ctx.fill(); });
    requestAnimationFrame(draw);
  }
  draw();
})();

// ── 启动 ──────────────────────────────────────────
init();
</script>
